<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komal Kumari - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 450px;
            width: 100%;
            border: 1px solid #334155;
        }
        h1 {
            font-size: 2rem;
            color: #38bdf8;
            margin-bottom: 8px;
        }
        p.subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 24px;
        }
        .taglines {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .tag {
            background: #334155;
            color: #e2e8f0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background: #0284c7;
            color: #fff;
        }
        .btn-primary:hover {
            background: #0369a1;
        }
        .btn-secondary {
            background: transparent;
            color: #e2e8f0;
            border: 1px solid #475569;
        }
        .btn-secondary:hover {
            background: #334155;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Komal Kumari</h1>
        <p class="subtitle">Computer Science Student | Frontend Developer</p>
        
        <div class="taglines">
            <span class="tag">Web Learner</span>
            <span class="tag">Lifelong Learner</span>
            <span class="tag">SafeX Solution Intern</span>
        </div>

        <div class="btn-group">
            <a href="https://github.com/komalkumarikhatri2005-ship-it" target="_blank" class="btn btn-primary">GitHub</a>
            <a href="https://www.linkedin.com/in/komal-kumari-0841893b6" target="_blank" class="btn btn-secondary">LinkedIn</a>
        </div>
    </div>

</body>
</html>
